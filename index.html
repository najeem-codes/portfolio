<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Najeem Takiyu-Deen — Data Analyst Portfolio</title>
<meta name="description" content="Portfolio of Najeem Takiyu-Deen — Global CRM Insights & Customer Data Analyst based in Zürich, Switzerland.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── VARIABLES ───────────────────────────────────────── */
:root {
  --navy: #1B1B2F;
  --navy-deep: #111120;
  --crystal: #3A6186;
  --crystal-light: #89A0B4;
  --gold: #C4A35A;
  --gold-light: #E8D5A3;
  --cream: #FAF8F4;
  --white: #FFFFFF;
  --text: #2C2C3E;
  --muted: #6B7280;
  --border: rgba(58,97,134,0.15);
}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
ul { list-style: none; }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── BASE ────────────────────────────────────────────── */
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── SHARED SECTION STYLES ───────────────────────────── */
.section-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 40px;
}

.section-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crystal);
  margin-bottom: 12px;
}

.section-label--gold { color: var(--gold); }

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 44px;
  font-weight: 300;
  color: var(--navy);
  margin-bottom: 48px;
  line-height: 1.15;
}

.section-title--white { color: var(--white); }

/* ── SCROLL ANIMATION ────────────────────────────────── */
.fade-in {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

@media (prefers-reduced-motion: reduce) {
  .fade-in { transition: none; opacity: 1; transform: none; }
}

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 24px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.5px;
  transition: opacity 0.2s, transform 0.15s;
  cursor: pointer;
}
.btn:hover { opacity: 0.85; transform: translateY(-1px); }

.btn-gold {
  background: var(--gold);
  color: var(--navy);
  font-weight: 600;
}

.btn-outline-gold {
  background: transparent;
  border: 1px solid rgba(196,163,90,0.5);
  color: var(--gold);
}

.btn-outline-crystal {
  background: transparent;
  border: 1px solid rgba(58,97,134,0.4);
  color: var(--crystal);
}

/* ── RESPONSIVE HELPERS ──────────────────────────────── */
@media (max-width: 768px) {
  .section-inner { padding: 60px 24px; }
  .section-title { font-size: 32px; }
}
/* ── NAV ─────────────────────────────────────────────── */
.site-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: transparent;
  transition: background 0.3s ease, box-shadow 0.3s ease;
}
.site-header.scrolled {
  background: rgba(27, 27, 47, 0.97);
  box-shadow: 0 1px 0 rgba(196,163,90,0.15);
}
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.nav-logo {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--gold);
}
.nav-links {
  display: flex;
  gap: 4px;
}
.nav-link {
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.6);
  border-bottom: 2px solid transparent;
  transition: color 0.2s, border-color 0.2s;
}
.nav-link:hover,
.nav-link.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  padding: 4px;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: var(--gold);
  border-radius: 2px;
  transition: transform 0.3s, opacity 0.3s;
}
.nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-hamburger.open span:nth-child(2) { opacity: 0; }
.nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
@media (max-width: 768px) {
  .nav-inner { padding: 0 24px; }
  .nav-hamburger { display: flex; }
  .nav-links {
    display: none;
    position: absolute;
    top: 64px; left: 0; right: 0;
    background: rgba(27,27,47,0.98);
    flex-direction: column;
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(196,163,90,0.15);
    gap: 0;
  }
  .nav-links.open { display: flex; }
  .nav-link { padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .nav-link:last-child { border-bottom: none; }
}
</style>
</head>
<body>

<!-- ── NAV ────────────────────────────────────────────── -->
<header class="site-header" id="site-header">
  <nav class="nav-inner">
    <a href="#hero" class="nav-logo">NT</a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="#about" class="nav-link">About</a></li>
      <li><a href="#skills" class="nav-link">Skills</a></li>
      <li><a href="#projects" class="nav-link">Projects</a></li>
      <li><a href="#experience" class="nav-link">Experience</a></li>
      <li><a href="#credentials" class="nav-link">Credentials</a></li>
      <li><a href="#contact" class="nav-link">Contact</a></li>
    </ul>
  </nav>
</header>

</html>
